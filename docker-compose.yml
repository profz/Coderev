version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: codereview
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  api:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    ports: ["8000:8000"]
    depends_on: [postgres, redis]
    volumes: [./backend:/app]

  worker:
    build: ./backend
    command: python -m app.worker.worker
    env_file: .env
    depends_on: [postgres, redis]
    volumes: [./backend:/app]

  frontend:
    build: ./frontend
    command: npm run dev
    ports: ["3000:3000"]
    environment:
      NUXT_PUBLIC_API_BASE: http://localhost:8000

volumes:
  pgdata:
